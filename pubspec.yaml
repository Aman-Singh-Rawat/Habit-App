name: habitly
description: "A new Flutter project."

publish_to: 'none' 



version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.3
  get: ^4.7.3
  iconsax: ^0.0.8
  linear_progress_bar: ^2.0.0+2
  numberpicker: ^2.1.2
  flutter_screenutil: ^5.9.3
  signature: ^6.3.0
  flutter_colorpicker: ^1.1.0
  table_calendar: ^3.2.0
  intl: ^0.20.2
  device_preview: ^1.3.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  toastification: ^3.0.3
  month_year_picker: ^0.5.0+1

dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/images/img_blue_logo.png'
  
  adaptive_icon_background: "#8985e9"
  adaptive_icon_foreground: "assets/images/img_splash_logo.png"

  flutter_test:
    sdk: flutter
    

  flutter_lints: ^6.0.0


flutter:


  uses-material-design: true

  # assets (images, icons, fonts)
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/inter/

  
  #fonts
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Thin.ttf
          weight: 100
        - asset: assets/fonts/inter/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/inter/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter_18pt-Italic.ttf
          weight: 400
          style: italic


    - family: DMMono
      fonts:
        - asset: assets/fonts/dm_mono/DMMono-Regular.ttf
          weight: 400

        - asset: assets/fonts/dm_mono/DMMono-Italic.ttf
          weight: 400
          style: italic

        - asset: assets/fonts/dm_mono/DMMono-Light.ttf
          weight: 300

        - asset: assets/fonts/dm_mono/DMMono-LightItalic.ttf
          weight: 300
          style: italic

        - asset: assets/fonts/dm_mono/DMMono-Medium.ttf
          weight: 500

        - asset: assets/fonts/dm_mono/DMMono-MediumItalic.ttf
          weight: 500
          style: italic

    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/poppins/Poppins-ThinItalic.ttf
          weight: 100
          style: italic

        - asset: assets/fonts/poppins/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/poppins/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic

        - asset: assets/fonts/poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/poppins/Poppins-LightItalic.ttf
          weight: 300
          style: italic

        - asset: assets/fonts/poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/poppins/Poppins-Italic.ttf
          weight: 400
          style: italic

        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-MediumItalic.ttf
          weight: 500
          style: italic

        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic

        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/poppins/Poppins-BoldItalic.ttf
          weight: 700
          style: italic

        - asset: assets/fonts/poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/poppins/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic

        - asset: assets/fonts/poppins/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/poppins/Poppins-BlackItalic.ttf
          weight: 900
          style: italic
